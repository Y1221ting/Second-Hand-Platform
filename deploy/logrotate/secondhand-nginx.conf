# 校园二手平台 — Nginx 访问/错误日志轮转
# 安装路径: sudo cp 到 /etc/logrotate.d/

/var/log/nginx/access.log
/var/log/nginx/error.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxage 7
    postrotate
        # 通知 Nginx 重新打开日志文件（否则继续写旧 fd）
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}
