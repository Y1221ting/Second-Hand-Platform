# 校园二手平台 — Winston 应用日志轮转
# 安装路径: sudo cp 到 /etc/logrotate.d/
#
# 匹配规则:
#   - daily:      每天轮转一次
#   - rotate 7:   保留最近 7 个归档
#   - compress:   归档压缩为 .gz
#   - copytruncate: 复制后清空，不关闭文件句柄（Winston 兼容）
#   - maxage 7:   超过 7 天强制删除

/opt/second-hand/Server/logs/*.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxage 7
}
