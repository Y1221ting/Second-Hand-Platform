version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: second-hand-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    networks:
      - second-hand-network

  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: second-hand-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI_FULL}
      - PORT=8000
      - CLIENT_URL=http://8.162.24.145:5000
      - QWEN_API_KEY=${QWEN_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - second-hand-network
    volumes:
      - ./Server:/app
      - /app/node_modules

  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        - REACT_APP_BASE_URL=http://8.162.24.145:8000
    container_name: second-hand-frontend
    restart: always
    ports:
      - "5000:80"
    depends_on:
      - backend
    networks:
      - second-hand-network

volumes:
  mongodb_data:

networks:
  second-hand-network:
    driver: bridge
